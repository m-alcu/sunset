# Builds the app with GCC and Clang on Linux plus MSVC on Windows, and runs
# the solar-math self-test on each.
#
# GitHub's ubuntu-latest image has no SDL3 package yet, so SDL3 is built from
# source into a cached prefix; after the first run the cache makes this fast.
# Windows uses the official prebuilt SDL3 VC devel package.
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  SDL_VERSION: release-3.2.16
  SDL_PREFIX: ${{ github.workspace }}/.sdl3-install

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - c_compiler: gcc
            cpp_compiler: g++
          - c_compiler: clang
            cpp_compiler: clang++

    steps:
    - uses: actions/checkout@v4

    - name: Cache SDL3
      id: cache-sdl3
      uses: actions/cache@v4
      with:
        path: ${{ env.SDL_PREFIX }}
        key: sdl3-${{ env.SDL_VERSION }}-${{ runner.os }}

    - name: Build SDL3 from source
      if: steps.cache-sdl3.outputs.cache-hit != 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build libx11-dev libxext-dev libwayland-dev libxkbcommon-dev libegl1-mesa-dev
        git clone --depth 1 --branch ${{ env.SDL_VERSION }} https://github.com/libsdl-org/SDL sdl-src
        cmake -S sdl-src -B sdl-src/build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ env.SDL_PREFIX }} \
          -DCMAKE_INSTALL_LIBDIR=lib \
          -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF
        cmake --build sdl-src/build
        cmake --install sdl-src/build

    - name: Configure CMake
      run: >
        PKG_CONFIG_PATH=${{ env.SDL_PREFIX }}/lib/pkgconfig
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=Release
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ github.workspace }}/build -j

    - name: Self-test
      # exercises the solar math and tz/DST conversion without needing a display
      run: LD_LIBRARY_PATH=${{ env.SDL_PREFIX }}/lib ${{ github.workspace }}/build/sunset --selftest 2026

  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download SDL3 (prebuilt VC package)
      shell: pwsh
      run: |
        $ver = "${{ env.SDL_VERSION }}" -replace "release-", ""
        Invoke-WebRequest "https://github.com/libsdl-org/SDL/releases/download/${{ env.SDL_VERSION }}/SDL3-devel-$ver-VC.zip" -OutFile sdl3.zip
        Expand-Archive sdl3.zip -DestinationPath .
        "SDL3_DIR_NAME=SDL3-$ver" >> $env:GITHUB_ENV

    - name: Configure CMake
      run: >
        cmake -B build
        -DCMAKE_PREFIX_PATH=${{ github.workspace }}/${{ env.SDL3_DIR_NAME }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build build --config Release

    - name: Self-test
      shell: pwsh
      run: |
        Copy-Item "${{ env.SDL3_DIR_NAME }}/lib/x64/SDL3.dll" build/Release/
        ./build/Release/sunset.exe --selftest 2026
